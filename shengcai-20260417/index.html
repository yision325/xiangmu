<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insight Dark Template</title>
  <meta name="description" content="One-folder webpage template for insight pages, recap pages, and structured content landing pages.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="container header-row">
        <a class="brand" href="#top">
          <span class="brand-mark"></span>
          <span>
            <strong id="brand-name">Template</strong>
            <small id="brand-tagline">One folder, one webpage</small>
          </span>
        </a>
        <nav class="site-nav" id="site-nav"></nav>
      </div>
      <div class="container">
        <div class="creator-bar" id="creator-bar"></div>
      </div>
    </header>

    <main id="top">
      <section class="renewal-top" aria-labelledby="renewal-top-title">
        <div class="container">
          <div class="renewal-shell">
            <div class="renewal-copy">
              <p class="section-kicker">Priority Info</p>
              <h2 class="renewal-title" id="renewal-top-title">体验营、新人价、续费价，先看这里</h2>
              <p class="renewal-summary">
                首屏只放最关键的信息。想先感受节奏就看体验营，准备加入就看新人优惠价，已经在圈里的朋友直接看续费价。
              </p>
              <div class="renewal-key-list">
                <article class="renewal-key-item">
                  <div>
                    <span class="renewal-key-label">3 天体验营</span>
                    <strong class="renewal-key-value">先体验，再决定</strong>
                  </div>
                  <p class="renewal-key-note">适合还在观察的人，先感受内容密度和社群氛围。</p>
                </article>
                <article class="renewal-key-item">
                  <div>
                    <span class="renewal-key-label">新人优惠价</span>
                    <strong class="renewal-key-value">2765 元 / 年</strong>
                  </div>
                  <p class="renewal-key-note">确定加入全年，直接看这个价格。</p>
                </article>
                <article class="renewal-key-item renewal-key-item-featured">
                  <div>
                    <span class="renewal-key-label">老圈友续费</span>
                    <strong class="renewal-key-value">1659 元 / 年</strong>
                  </div>
                  <p class="renewal-key-note">重点续费信息，海报里标的是 6 折续费价。</p>
                </article>
              </div>
            </div>
            <div class="renewal-media" aria-label="体验营与新人优惠海报">
              <figure class="renewal-poster">
                <img src="assets/%E4%B8%83%E5%93%A5%E6%B8%A0%E9%81%93-%E7%94%9F%E8%B4%A2%E6%9C%89%E6%9C%AF%E7%AC%AC%E5%8D%81%E5%B9%B4%C2%B73%E5%A4%A9%E4%BD%93%E9%AA%8C%E8%90%A5.jpg" alt="生财有术第十年 3 天体验营海报">
                <figcaption>体验营入口</figcaption>
              </figure>
              <figure class="renewal-poster">
                <img src="assets/%E4%B8%83%E5%93%A5%E6%B8%A0%E9%81%93-%E7%94%9F%E8%B4%A2%E6%9C%89%E6%9C%AF%E7%AC%AC%E5%8D%81%E5%B9%B4%E4%BC%98%E6%83%A0%E4%BB%B72765%E5%85%83%20.jpg" alt="生财有术第十年新人优惠价与续费价海报">
                <figcaption>新人价和续费价</figcaption>
              </figure>
            </div>
          </div>
        </div>
      </section>

      <section class="hero">
        <div class="hero-orb hero-orb-a"></div>
        <div class="hero-orb hero-orb-b"></div>
        <div class="container hero-grid">
          <div class="hero-copy">
            <p class="eyebrow" id="hero-eyebrow"></p>
            <h1 class="hero-title" id="hero-title"></h1>
            <p class="hero-summary" id="hero-summary"></p>
            <div class="hero-actions" id="hero-actions"></div>
            <div class="hero-stats" id="hero-stats"></div>
          </div>
          <aside class="hero-panel">
            <div class="panel-kicker" id="hero-panel-kicker"></div>
            <h2 class="panel-title" id="hero-panel-title"></h2>
            <p class="panel-text" id="hero-panel-text"></p>
            <ul class="panel-list" id="hero-panel-list"></ul>
          </aside>
        </div>
      </section>

      <section class="section focus-section" id="focus">
        <div class="container">
          <div class="section-head">
            <div>
              <p class="section-kicker" id="focus-kicker"></p>
              <h2 class="section-title" id="focus-title"></h2>
            </div>
            <p class="section-note" id="focus-note"></p>
          </div>
          <div class="focus-grid" id="focus-grid"></div>
        </div>
      </section>

      <section class="section module-section" id="modules">
        <div class="container">
          <div class="section-head">
            <div>
              <p class="section-kicker" id="modules-kicker"></p>
              <h2 class="section-title" id="modules-title"></h2>
            </div>
            <div class="module-filters" id="module-filters"></div>
          </div>

          <div class="module-layout">
            <article class="module-spotlight" id="module-spotlight"></article>
            <div class="module-list" id="module-list"></div>
          </div>
        </div>
      </section>

      <section class="section quotes-section" id="quotes">
        <div class="container">
          <div class="section-head">
            <div>
              <p class="section-kicker" id="quotes-kicker"></p>
              <h2 class="section-title" id="quotes-title"></h2>
            </div>
          </div>
          <div class="quotes-grid" id="quotes-grid"></div>
        </div>
      </section>

      <section class="section archive-section" id="archive">
        <div class="container">
          <div class="section-head">
            <div>
              <p class="section-kicker" id="archive-kicker"></p>
              <h2 class="section-title" id="archive-title"></h2>
            </div>
            <p class="section-note" id="archive-note"></p>
          </div>
          <div class="archive-grid" id="archive-grid"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-row">
        <div>
          <strong id="footer-title"></strong>
          <p id="footer-copy"></p>
        </div>
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>
  </div>

  <script src="content.js"></script>
  <script src="app.js"></script>
</body>
</html>
